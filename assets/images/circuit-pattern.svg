<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,107,26,0.04)" stroke-width="0.5"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="400" height="400" fill="#0a0a0a"/>
  <rect width="400" height="400" fill="url(#grid)"/>
  <!-- Circuit traces -->
  <g stroke="rgba(255,107,26,0.06)" fill="none" stroke-width="1">
    <path d="M50,200 H120 V120 H200"/>
    <path d="M200,120 H280 V200 H350"/>
    <path d="M100,300 H180 V250 H250 V300 H350"/>
    <path d="M50,80 H100 V160 H150"/>
    <path d="M250,50 V100 H300 V180"/>
    <path d="M300,250 H350 V350"/>
    <path d="M50,350 H150 V280"/>
  </g>
  <!-- Nodes -->
  <g fill="rgba(255,107,26,0.08)">
    <circle cx="120" cy="200" r="3"/>
    <circle cx="200" cy="120" r="3"/>
    <circle cx="280" cy="200" r="3"/>
    <circle cx="180" cy="300" r="3"/>
    <circle cx="250" cy="250" r="3"/>
    <circle cx="100" cy="80" r="3"/>
    <circle cx="300" cy="180" r="3"/>
    <circle cx="150" cy="280" r="3"/>
    <circle cx="50" cy="200" r="2"/>
    <circle cx="350" cy="200" r="2"/>
    <circle cx="350" cy="300" r="2"/>
    <circle cx="350" cy="350" r="2"/>
  </g>
</svg>
